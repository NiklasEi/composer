name: Build and Deploy Satis Repository

on:
  # Trigger when oicana repo has a new PHP release
  repository_dispatch:
    types: [php-release]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout oicana repo
        uses: actions/checkout@v4
        with:
          repository: oicana/oicana
          path: oicana-source
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Satis
        run: |
          composer global config allow-plugins.composer/satis true
          composer global require composer/satis:3.x@dev

      - name: Create split repos with version tags from monorepo tags
        run: |
          # Initialize standalone repos for each package
          git init repo-oicana
          git init repo-installer

          cd ${{ github.workspace }}/oicana-source

          # Process oicana_php tags -> oicana/oicana package
          for tag in $(git tag -l 'oicana_php-v*'); do
            version="${tag#oicana_php-v}"
            git checkout "$tag"
            # Split the subtree at this tag's commit
            split_sha=$(git subtree split --prefix=integrations/php/oicana-php)
            cd ${{ github.workspace }}/repo-oicana
            git fetch ${{ github.workspace }}/oicana-source "$split_sha"
            git tag "$version" "$split_sha"
            cd ${{ github.workspace }}/oicana-source
          done

          # Process oicana_php tags -> oicana/installer package (same tag, different subtree)
          for tag in $(git tag -l 'oicana_php-v*'); do
            version="${tag#oicana_php-v}"
            git checkout "$tag"
            split_sha=$(git subtree split --prefix=integrations/php/oicana-php-installer)
            cd ${{ github.workspace }}/repo-installer
            git fetch ${{ github.workspace }}/oicana-source "$split_sha"
            git tag "$version" "$split_sha"
            cd ${{ github.workspace }}/oicana-source
          done

      - name: Add checksums for installer tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}/repo-installer
        run: |
          # For each installer tag, fetch the per-release checksums.json that
          # the binary publish pipeline uploaded and add it to the tagged
          # commit. The source repo ships a placeholder checksums.json with an
          # empty binaries map; this step overwrites that placeholder with the
          # real per-release hashes before Satis archives the tag. Tags whose
          # release has no checksums.json (e.g. pre-feature releases) are left
          # untouched — their subtree state on disk is what Satis archives.
          git config user.email satis-bot@oicana.com
          git config user.name satis-bot
          for version in $(git tag -l); do
            release_tag="oicana_php-v${version}"
            git checkout "$version"

            tmp=$(mktemp -d)
            if gh release download "$release_tag" \
                 --repo oicana/oicana \
                 --pattern 'checksums.json' \
                 --dir "$tmp" 2>/dev/null; then
              cp "$tmp/checksums.json" checksums.json
              git add checksums.json
              if ! git diff --quiet --cached; then
                git commit --amend --no-edit
                git tag -f "$version"
              fi
            else
              echo "::notice::No checksums.json on release for ${version}; leaving subtree as-is"
            fi
            rm -rf "$tmp"
          done

      - name: Generate satis.json
        run: |
          cat > satis.json <<EOF
          {
              "name": "oicana/packages",
              "homepage": "https://composer.oicana.com",
              "repositories": [
                  {
                      "type": "vcs",
                      "url": "${{ github.workspace }}/repo-oicana"
                  },
                  {
                      "type": "vcs",
                      "url": "${{ github.workspace }}/repo-installer"
                  }
              ],
              "require": {
                  "oicana/oicana": "*",
                  "oicana/installer": "*"
              },
              "require-dependencies": false,
              "require-dev-dependencies": false,
              "archive": {
                  "directory": "dist",
                  "format": "tar",
                  "skip-dev": true
              }
          }
          EOF

      - name: Build Satis repository
        run: |
          mkdir -p public
          ~/.composer/vendor/bin/satis build satis.json public --no-interaction

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
